version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: deployment_db
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: deployment_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data: